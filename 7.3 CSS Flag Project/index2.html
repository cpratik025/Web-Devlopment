<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red{
            width: auto;
            height: 500px;
            background-color: red;
        }
        .blue{
            position:relative;
            background-color: blue;
            width: auto;
            height: 200px;
            top: 150px;
        }
        .circle{
            background-color: white;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            position: absolute;
            left:50%;
            top:24.5px;
            text-align: center;
        }
        p{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="red">
        <div class="blue">
            <div class="circle">
                Flag of Laos
            </div>
        </div>
    </div>
</body>
</html>
